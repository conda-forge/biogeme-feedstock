{% set name = "biogeme" %}
{% set version = "3.3.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/biogeme-{{ version }}.tar.gz
  sha256: 04fd59c93fa3eafc4a3af229f31601727b9f76b9fe64792b5bbf84b6c9c87d7c

build:
  skip: true  # [win or py<311]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 2

requirements:
  host:
    - python                  
    - setuptools >=75.0
    - wheel
    - pip
  run:
    - python                   
    - pandas >=2.3.0,<3
    - scipy >=1.15.3
    - tqdm >=4.67.1
    - tomlkit >=0.13.3
    - python-levenshtein >=0.25.1
    - fuzzywuzzy >=0.18.0
    - biogeme-optimization >=0.0.11
    - matplotlib-base >=3.10.3
    - numpy >=2.2.6
    - ipython >=8.37.0
    - jinja2 >=3.1.4
    - pyyaml >=6.0.2
    - jax >=0.6.2
    - tabulate >=0.9.0
    - joblib >=1.5.1
    - tqdm-joblib >=0.0.4
    - pymc >=5.25.1
    - numpyro >=0.19.0
    - h5netcdf >=1.7.3
    - h5py >=3.15.1

test:
  imports:
    - biogeme
  commands:
    - pip check
  requires:
    - pip

about:
  home: http://biogeme.epfl.ch
  summary: Estimation and application of discrete choice models.
  license: LicenseRef-BIOGEME
  license_file: LICENSE
  dev_url: https://github.com/michelbierlaire/biogeme

extra:
  recipe-maintainers:
    - FGarridoV
    - sandervancranenburgh
